# --- General Settings ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -s escape-time 0
set -g history-limit 50000
set -g mouse on

# Window and Pane indexing (Start at 1)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on


# highlight when something happens in a hidden pane
setw -g monitor-activity on
set -g visual-activity on


set -g set-titles on
set -g set-titles-string "#T"

# True color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g terminal-overrides 'screen*,xterm*:smcup@:rmcup@'
# --- Keybinds ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# --- Visual Styling (Retro Clean) ---
set -g status-position top
set -g status-style 'bg=#0d0d0d fg=#cccccc'
set -g status-left '#[fg=#cccccc,bold] #S '
set -g status-right '#[fg=#666666] %H:%M #[fg=#333333]|#[fg=#666666] %d-%b '
set -g window-status-current-format '#[fg=#ffffff,bold] *#I:#W '
set -g window-status-format '#[fg=#666666] #I:#W '
set -g pane-border-style 'fg=#1a1a1a'
set -g pane-active-border-style 'fg=#666666'

#set -g message-fg magenta
# set -g message-bg red
# set -g message-attr bright


# --- Productivity Hacks ---
bind y set-window-option synchronize-panes \; display "Sync panes: #{?window-options-synchronize-panes,ON,OFF}"
bind Space next-layout
bind m set-window-option monitor-activity \; display "Monitor activity: #{?window-options-monitor-activity,ON,OFF}"
bind M set-window-option monitor-silence 0 \; display "Monitor silence: #{?window-options-monitor-silence,ON,OFF}"

# Copy mode vim keys
setw -g mode-keys vi

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TPM
run '/home/lahcen/.tmux/plugins/tpm/tpm'


# log the output of this pane to a file
bind P pipe-pane -o "cat >>~/#W.log" \; display "toggled logging to ~/#W.log"

# send to all panes simultaneously
bind S set-window-option synchronize-panes
