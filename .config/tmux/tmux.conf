# --- General Settings ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -s escape-time 0
set -g history-limit 50000

# --- The Seamless Mouse Fix ---
# 1. Enable mouse tracking so tmux handles multi-page scrolling smoothly
set -g mouse on

# 2. Sync tmux selection straight to your Alacritty/system clipboard
set -g set-clipboard on

# 3. KILL THE YELLOW BAR: Change the selection highlight to a clean, dark-gray blend
set -g mode-style "fg=default,bg=#3e4452"

# 4. AUTO-COPY ON RELEASE: Instantly copies text and exits selection mode when you let go
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- Layout & Keybinds ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (Vim keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick reload
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- Visual Styling (Your Retro Clean Look) ---
set -g status-position top
set -g status-style 'bg=#0d0d0d fg=#cccccc'
set -g status-left '#[fg=#cccccc,bold] #S '
set -g status-right '#[fg=#666666] %H:%M #[fg=#333333]|#[fg=#666666] %d-%b '
set -g window-status-current-format '#[fg=#ffffff,bold] *#I:#W '
set -g window-status-format '#[fg=#666666] #I:#W '
set -g pane-border-style 'fg=#1a1a1a'
set -g pane-active-border-style 'fg=#666666'

# Copy mode vim keys
setw -g mode-keys vi
