# ============================================
# THEME REFERENCE - Catppuccin Mocha + Glacier
# ============================================
# Use this file as a reference to manually update colors in configs.
# Current theme: Catppuccin Mocha
# Glacier theme preserved below (commented out)
# ============================================

# ============================================
# CURRENT THEME: CATPPUCCIN MOCHA
# ============================================

[base]
bg_primary = "#1e1e2e"
bg_surface = "#181825"
bg_surface_highlight = "#313244"
bg_muted = "#45475a"

[text]
primary = "#cdd6f4"
subtext = "#a6adc8"
muted = "#585b70"
accent = "#f5e0dc"

[accent]
blue = "#89b4fa"
lavender = "#b4befe"
pink = "#f5c2e7"
mauve = "#cba6f7"
flamingo = "#eba0ac"
peach = "#fab387"
green = "#a6e3a1"
teal = "#94e2d5"
yellow = "#f9e2af"
red = "#f38ba8"
sapphire = "#74c7ec"
sky = "#89dceb"
overlay = "#6c7086"

[borders]
active = "rgba(89b4faee)"
inactive = "rgba(595959aa)"

[cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[selection]
background = "#313244"

