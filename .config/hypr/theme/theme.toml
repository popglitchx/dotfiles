# ============================================
# USAGE
# ============================================
# To switch themes, manually update these files:
# - ~/.config/alacritty/alacritty.toml (colors section)
# - ~/.config/tmux/tmux.conf (status-style, pane-border-style)
# - ~/.config/waybar/style.css (hardcoded colors)
# - ~/.config/hypr/hyprland.conf (general col.active_border, col.inactive_border)
# ============================================
